<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagong Il & Joung Daeun | 결혼식 초대장</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #ffffff;
            color: #333;
            line-height: 1.6;
            letter-spacing: 0.3px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            background: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header Section */
        .header {
            padding: 80px 40px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
            position: relative;
        }


.groom, .bride {
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 1px;
            margin: 20px 0;
            font-family: 'Tangerine', cursive;
        }

        .groom {
            color: #666;
        }

        .bride {
            color: #666;
        }

        .divider {
            display: inline-block;
            width: 1px;
            height: 20px;
            background: #ccc;
            margin: 0 15px;
            vertical-align: middle;
        }

        .names-container {
            margin: 40px 0;
        }

        .date {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 1px;
            margin: 40px 0;
            color: #000;
        }

        .date-sub {
            font-size: 13px;
            color: #999;
            letter-spacing: 1px;
            margin-top: 10px;
        }


        /* Greeting Section */
        .greeting {
            padding: 60px 40px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .greeting-text {
            font-size: 14px;
            line-height: 1.8;
            color: #666;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* Info Section */
        .info-section {
            padding: 60px 40px;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-title {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 30px;
            text-align: center;
        }

        .info-item {
            margin-bottom: 30px;
            text-align: center;
        }

        .info-label {
            font-size: 12px;
            color: #999;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .info-content {
            font-size: 15px;
            color: #333;
            font-weight: 400;
        }

        .time {
            font-size: 16px;
            font-weight: 500;
            color: #000;
            margin: 5px 0;
        }

        .venue {
            font-size: 14px;
            color: #555;
            margin-top: 15px;
        }

        .venue-detail {
            font-size: 13px;
            color: #999;
            margin-top: 5px;
        }

        /* Gallery Section */
        .gallery {
            padding: 60px 40px;
            border-bottom: 1px solid #f0f0f0;
        }

        .gallery-placeholder {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #f5f5f5 0%, #fafafa 100%);
            border: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
            border-radius: 2px;
            margin-bottom: 20px;
        }

        /* RSVP Section */
        .rsvp {
            padding: 60px 40px;
            border-bottom: 1px solid #f0f0f0;
        }

        .rsvp-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 12px;
            color: #999;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select {
            padding: 12px;
            border: 1px solid #e0e0e0;
            font-size: 14px;
            font-family: inherit;
            color: #333;
            background: #fff;
            border-radius: 2px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #999;
        }

        .submit-btn {
            padding: 14px;
            background: #000;
            color: #fff;
            border: none;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 500;
            transition: all 0.3s;
            border-radius: 2px;
        }

        .submit-btn:hover {
            background: #333;
        }

        .submit-btn:active {
            background: #000;
            transform: scale(0.98);
        }

        /* Footer */
        .footer {
            padding: 60px 40px;
            text-align: center;
            color: #999;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .footer-line {
            width: 30px;
            height: 1px;
            background: #ddd;
            margin: 0 auto 20px;
        }
.lace-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            height: auto;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        .header {
            position: relative;
        }

        .names-container,
        .date {
            position: relative;
            z-index: 1;
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .header {
                padding: 60px 30px;
            }

            .info-section,
            .greeting,
            .gallery,
            .rsvp,
            .footer {
                padding: 50px 30px;
            }

            .date {
                font-size: 24px;
            }

            .gallery-placeholder {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
<!-- Header -->
        <div class="header">
            <img src="764ac25286aca4b29e533eaaee825558.jpg" class="lace-image" alt="lace decoration">
            <div class="names-container">
                <div class="groom">Sagong Il</div>
                <span class="divider"></span>
                <div class="bride">Joung Daeun</div>
            </div>
            <div class="date">
                2027.09.21
                <div class="date-sub">Tuesday</div>
            </div>
        </div>

        <!-- Greeting -->
        <div class="greeting">
            <p class="greeting-text">
                저희 두 사람이 인생에서 가장 아름다운 순간을<br>
                함께 나누고 싶습니다.<br><br>
                바쁘시겠지만 오셔서<br>
                저희의 행복한 날을 축복해 주세요.
            </p>
        </div>

        <!-- Info Section -->
        <div class="info-section">
            <div class="info-title">When & Where</div>
            
            <div class="info-item">
                <div class="info-label">Date</div>
                <div class="time">2027년 9월 21일 (화요일)</div>
            </div>

            <div class="info-item">
                <div class="info-label">Time</div>
                <div class="time">오후 3시</div>
            </div>

            <div class="info-item">
                <div class="info-label">Venue</div>
                <div class="venue">예식장 이름</div>
                <div class="venue-detail">주소</div>
            </div>
        </div>

        <!-- Gallery -->
        <div class="gallery">
            <div class="info-title">Gallery</div>
            <div class="gallery-placeholder">
                사진 영역 (이미지 추가 예정)
            </div>
        </div>

        <!-- RSVP -->
        <div class="rsvp">
            <div class="info-title">RSVP</div>
            <form class="rsvp-form">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" placeholder="이름을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label for="phone">연락처</label>
                    <input type="tel" id="phone" placeholder="010-0000-0000" required>
                </div>

                <div class="form-group">
                    <label for="attendance">참석 여부</label>
                    <select id="attendance" required>
                        <option value="">선택하세요</option>
                        <option value="yes">참석</option>
                        <option value="no">불참</option>
                        <option value="maybe">미정</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="guests">동반 인원</label>
                    <input type="number" id="guests" placeholder="명" min="1" max="5" required>
                </div>

                <div class="form-group">
                    <label for="message">축하 메시지</label>
                    <input type="text" id="message" placeholder="축하 메시지를 남겨주세요">
                </div>

                <button type="submit" class="submit-btn">응답 보내기</button>
            </form>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-line"></div>
            <p>Thank you for celebrating with us</p>
        </div>
    </div>
</body>
</html>
